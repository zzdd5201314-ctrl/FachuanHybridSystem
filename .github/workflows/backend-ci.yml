name: backend-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
  schedule:
    - cron: "0 2 * * *"

jobs:
  backend-security-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Security guard (ID/mobile/email/password/token in added lines)
        run: |
          set -euo pipefail
          base=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${base}" ]; then
            echo "No base commit found, skipping diff security guard."
            exit 0
          fi
          python3 backend/devtools/security_guard.py \
            --check sensitive \
            --mode range \
            --base "${base}" \
            --head HEAD

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fachuan_ci_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fachuan_ci_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repository hygiene
        run: |
          set -euo pipefail

          banned=$(git ls-files | grep -E '(^|/)(\.DS_Store|__pycache__/|[^/]+\.pyc)$' || true)
          if [ -n "${banned}" ]; then
            echo "Found banned tracked artifacts:"
            echo "${banned}"
            exit 1
          fi

          env_tracked=$(git ls-files | grep -E '(^|/)\.env(\.[^/]+)?$' | grep -v -E '(^|/)\.env\.example$' || true)
          if [ -n "${env_tracked}" ]; then
            echo "Found tracked .env files (do not commit secrets):"
            echo "${env_tracked}"
            exit 1
          fi

          media_tracked=$(git ls-files backend/media backend/apiSystem/media 2>/dev/null | grep -v '\.gitkeep$' || true)
          if [ -n "${media_tracked}" ]; then
            echo "Found tracked media artifacts (expected to be runtime-only):"
            echo "${media_tracked}"
            exit 1
          fi

          venv_tracked=$(git ls-files | grep -E '^(backend/)?(\.venv|venv(311|312)?)/' || true)
          if [ -n "${venv_tracked}" ]; then
            echo "Found tracked virtualenv files (do not commit venv):"
            echo "${venv_tracked}"
            exit 1
          fi

          forbidden_binary_in_source=$(git ls-files | grep -Ei '^(backend/(apps|apiSystem|scripts)/|scripts/).*\.(onnx|mp4|zip)$' || true)
          if [ -n "${forbidden_binary_in_source}" ]; then
            echo "Found forbidden binary suffixes in source directories:"
            echo "${forbidden_binary_in_source}"
            echo "Use artifact/object storage instead of tracking these files in Git history."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python
        run: uv run python -m compileall -q apps apiSystem

      - name: Pre-commit (changed files)
        run: |
          set -euo pipefail
          base=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${base}" ]; then
            echo "No base commit found, skipping pre-commit changed-files gate."
            exit 0
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "${base}" HEAD | grep -E '^backend/' || true)"
          if [ -z "${files}" ]; then
            echo "No changed backend files."
            exit 0
          fi
          uv run pre-commit run --files ${files}

      - name: Lint (ruff, changed files)
        run: |
          set -euo pipefail
          base=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${base}" ]; then
            echo "No base commit found, skipping ruff changed-files gate."
            exit 0
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "${base}" HEAD | grep -E '^backend/apps/.*\.py$' | sed 's|^backend/||' || true)"
          if [ -z "${files}" ]; then
            echo "No changed backend/apps/*.py files."
            exit 0
          fi
          uv run ruff check ${files} --config ruff.toml

      - name: Lint (ruff, core + apiSystem)
        run: uv run ruff check apps/core apiSystem --config ruff.toml

      - name: Type check (mypy, changed files)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          set -euo pipefail
          base=""
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            base="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi
          if [ -z "${base}" ]; then
            echo "No base commit found, skipping mypy changed-files gate."
            exit 0
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "${base}" HEAD | grep -E '^backend/apps/.*\.py$' | sed 's|^backend/||' || true)"
          if [ -z "${files}" ]; then
            echo "No changed backend/apps/*.py files."
            exit 0
          fi
          uv run mypy --config-file=mypy.ini --follow-imports=skip ${files}

      - name: Type check (mypy, curated gate)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          uv run mypy --config-file=mypy.ini --follow-imports=skip \
            apps/core/services/wiring.py \
            apps/core/protocols/common_protocols.py \
            apps/core/dto/auth.py \
            apps/core/infrastructure/throttling.py \
            apps/core/exceptions/handlers.py \
            apiSystem/apiSystem/api.py

      - name: Tests (collection smoke)
        env:
          DJANGO_DEBUG: "1"
          DB_ENGINE: "postgresql"
          TEST_DB_ENGINE: "postgresql"
          TEST_DB_NAME: "fachuan_ci_test"
          TEST_DB_USER: "postgres"
          TEST_DB_PASSWORD: "postgres"
          TEST_DB_HOST: "127.0.0.1"
          TEST_DB_PORT: "5432"
          PYTHONPATH: "apiSystem:."
        run: uv run pytest -c pytest.ini --no-cov --collect-only -q tests/ci/structure/

      - name: Tests (unit)
        env:
          DJANGO_DEBUG: "1"
          DB_ENGINE: "postgresql"
          TEST_DB_ENGINE: "postgresql"
          TEST_DB_NAME: "fachuan_ci_test"
          TEST_DB_USER: "postgres"
          TEST_DB_PASSWORD: "postgres"
          TEST_DB_HOST: "127.0.0.1"
          TEST_DB_PORT: "5432"
          PYTHONPATH: "apiSystem:."
        run: uv run pytest -c pytest.ini --no-cov -q tests/ci/unit/

      - name: Smoke check (minimal)
        env:
          DJANGO_DEBUG: "1"
          DB_ENGINE: "postgresql"
          DB_NAME: "fachuan_ci_test"
          DB_USER: "postgres"
          DB_PASSWORD: "postgres"
          DB_HOST: "127.0.0.1"
          DB_PORT: "5432"
          PYTHONPATH: "apiSystem:."
        run: |
          uv run python apiSystem/manage.py smoke_check \
            --skip-admin \
            --skip-websocket \
            --skip-q

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

      - name: Static security scan (bandit)
        run: uv run bandit -r apps -q -lll -x "*/migrations/*,*/static/*,*/staticfiles/*,*/media/*,*/venv*/*,*/htmlcov/*"

  backend-ruff-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff, core + apiSystem)
        run: uv run ruff check apps/core apiSystem --config ruff.toml

  backend-mypy-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
