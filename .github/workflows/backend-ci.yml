        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type check (mypy, core + apiSystem)
        env:
          PYTHONPATH: "apiSystem:."
        run: |
          uv run mypy --config-file=mypy.ini --follow-imports=skip \
            apps/core/services/wiring.py \
            apps/core/protocols/common_protocols.py \
            apps/core/dto/auth.py \
            apps/core/infrastructure/throttling.py \
            apps/core/exceptions/handlers.py \
            apps/organization/services/organization_access_policy.py \
            apiSystem/apiSystem/api.py

  backend-unit-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fachuan_ci_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d fachuan_ci_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Tests (unit + coverage gate)
        env:
          DJANGO_DEBUG: "1"
          DB_ENGINE: "postgresql"
          TEST_DB_ENGINE: "postgresql"
          TEST_DB_NAME: "fachuan_ci_test"
          TEST_DB_USER: "postgres"
          TEST_DB_PASSWORD: "postgres"
          TEST_DB_HOST: "127.0.0.1"
          TEST_DB_PORT: "5432"
          PYTHONPATH: "apiSystem:."
        run: |
          uv run pytest -c pytest.ini -q -o addopts="" \
            --reuse-db --import-mode=importlib \
            --cov=apps.cases.services.case.case_admin_export_bridge \
            --cov=apps.cases.services.case.case_contract_export_bridge \
            --cov=apps.contracts.services.contract.admin_workflows.clone_workflow \
            --cov=apps.client.services.text_parser \
            --cov=apps.enterprise_data.services.clients.api_key_pool \
            --cov-report=term-missing --cov-fail-under=85 \
            tests/ci/unit/

  backend-integration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    services:
