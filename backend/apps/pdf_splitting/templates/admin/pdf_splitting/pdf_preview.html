<!DOCTYPE html>
<html lang="zh-CN">
{% load i18n %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "PDF预览" %} - {{ filename }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #525659; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .toolbar button {
            background: #555;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background .15s;
        }
        .toolbar button:hover:not(:disabled) { background: #666; }
        .toolbar button:disabled { opacity: .4; cursor: not-allowed; }
        .toolbar span { color: #fff; font-size: 14px; min-width: 80px; text-align: center; }
        .toolbar .title { color: #ccc; font-size: 13px; margin-right: auto; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .canvas-wrap {
            margin-top: 50px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        canvas {
            max-width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,.5);
            background: #fff;
        }
        .page-range-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="title">{{ filename }}</span>
        <button id="prevBtn">{% trans "上一页" %}</button>
        <span id="pageInfo">- / -</span>
        <button id="nextBtn">{% trans "下一页" %}</button>
        <button id="zoomOutBtn">-</button>
        <span id="zoomInfo">100%</span>
        <button id="zoomInBtn">+</button>
    </div>
    <div class="canvas-wrap">
        <canvas id="pdfCanvas"></canvas>
    </div>
    <div class="page-range-hint" id="rangeHint" style="display:none;"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const pdfUrl = '{{ pdf_url }}';
        const startPage = {{ start_page }};
        const endPage = {{ end_page }};
        
        let pdfDoc = null;
        let currentPage = startPage;
        let currentScale = 1.2;
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');
        const pageInfo = document.getElementById('pageInfo');
        const zoomInfo = document.getElementById('zoomInfo');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const rangeHint = document.getElementById('rangeHint');
        
        // 显示页码范围提示
        const totalPagesInRange = endPage - startPage + 1;
        if (totalPagesInRange > 1) {
            rangeHint.textContent = '{% trans "片段页码范围：" %}' + startPage + ' - ' + endPage + ' ({% trans "共" %}' + totalPagesInRange + '{% trans "页" %})';
        } else {
            rangeHint.textContent = '{% trans "单页片段：第" %}' + startPage + '{% trans "页" %}';
        }
        rangeHint.style.display = 'block';
        
        async function loadPdf() {
            try {
                const response = await fetch(pdfUrl, { credentials: 'same-origin' });
                if (!response.ok) throw new Error('Failed to load PDF');
                const blob = await response.blob();
                const arrayBuffer = await blob.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                renderPage(currentPage);
            } catch (err) {
                console.error('PDF load error:', err);
                document.body.innerHTML = '<div style="color:#fff;text-align:center;padding:100px;">PDF加载失败: ' + err.message + '</div>';
            }
        }
        
        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: currentScale });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
            
            // 更新页码显示（相对于片段范围）
            const pageIndex = pageNum - startPage + 1;
            const totalPages = endPage - startPage + 1;
            pageInfo.textContent = `${pageIndex} / ${totalPages}`;
            pageInfo.style.color = '#4ade80';  // 所有页面都在范围内，显示绿色
            
            // 更新按钮状态（只允许在片段范围内翻页）
            prevBtn.disabled = pageNum <= startPage;
            nextBtn.disabled = pageNum >= endPage;
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentPage > startPage) {
                currentPage--;
                renderPage(currentPage);
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentPage < endPage) {
                currentPage++;
                renderPage(currentPage);
            }
        });
        
        document.getElementById('zoomInBtn').addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.2, 3);
            zoomInfo.textContent = Math.round(currentScale * 100) + '%';
            renderPage(currentPage);
        });
        
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.2, 0.5);
            zoomInfo.textContent = Math.round(currentScale * 100) + '%';
            renderPage(currentPage);
        });
        
        // 键盘导航（只在片段范围内）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentPage > startPage) {
                currentPage--;
                renderPage(currentPage);
            } else if (e.key === 'ArrowRight' && currentPage < endPage) {
                currentPage++;
                renderPage(currentPage);
            }
        });
        
        loadPdf();
    </script>
</body>
</html>
