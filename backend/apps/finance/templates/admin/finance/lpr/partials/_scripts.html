{% load i18n %}
<script>
function lprCalculator() {
    return {
        useChanges: false,
        showDetail: false,
        showHistory: false,
        form: {
            start_date: '',
            end_date: '',
            principal: '',
            rate_mode: 'lpr',
            rate_type: '1y',
            multiplier: 1,
            custom_rate_unit: 'percent',
            custom_rate_value: '',
            year_days: 360,
            date_inclusion: 'both',
            changes: [{start_date: '', end_date: '', principal: ''}]
        },
        result: null,
        history: [],

        init() {
            const today = new Date();
            const lastYear = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
            this.form.end_date = this.formatDate(today);
            this.form.start_date = this.formatDate(lastYear);
            this.loadHistory();
        },

        loadHistory() {
            const saved = localStorage.getItem('lpr_calculator_history');
            this.history = saved ? JSON.parse(saved) : [];
        },

        saveToHistory() {
            if (!this.result || !this.result.success) return;

            const historyItem = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                useChanges: this.useChanges,
                form: JSON.parse(JSON.stringify(this.form)),
                result: {
                    total_interest: this.result.total_interest,
                    total_days: this.result.total_days,
                    total_principal: this.result.total_principal
                },
                rateInfo: this.getRateInfo()
            };

            this.history.unshift(historyItem);
            if (this.history.length > 20) {
                this.history = this.history.slice(0, 20);
            }

            localStorage.setItem('lpr_calculator_history', JSON.stringify(this.history));
        },

        getRateInfo() {
            // 生成利率信息的简短描述
            if (this.form.rate_mode === 'lpr') {
                const rateType = this.form.rate_type === '1y' ? "{% trans '一年期' %}" : "{% trans '五年期' %}";
                return `LPR ${rateType} · ${this.form.multiplier}{% trans '倍' %}`;
            } else if (this.form.rate_mode === 'delay') {
                return "{% trans '迟延履行' %} · 1.75‱/{% trans '天' %}";
            } else {
                // 自定义利率
                let unitText = '';
                if (this.form.custom_rate_unit === 'percent') {
                    unitText = '%/{% trans '年' %}';
                } else if (this.form.custom_rate_unit === 'permille') {
                    unitText = '‰/{% trans '天' %}';
                } else if (this.form.custom_rate_unit === 'permyriad') {
                    unitText = '‱/{% trans '天' %}';
                }
                return "{% trans '自定义' %} · " + this.form.custom_rate_value + unitText;
            }
        },

        loadFromHistory(item) {
            this.useChanges = item.useChanges;
            this.form = JSON.parse(JSON.stringify(item.form));
            this.showHistory = false;
            // 标记为从历史记录加载，计算后不保存
            this._skipHistorySave = true;
            this.calculate();
        },

        deleteHistoryItem(id) {
            this.history = this.history.filter(h => h.id !== id);
            localStorage.setItem('lpr_calculator_history', JSON.stringify(this.history));
        },

        clearHistory() {
            if (confirm('{% trans "确定要清空所有历史记录吗？" %}')) {
                this.history = [];
                localStorage.removeItem('lpr_calculator_history');
            }
        },

        formatHistoryTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        },

        formatDate(d) {
            if (typeof d === 'string' && d.includes('T')) {
                d = new Date(d);
            }
            if (d instanceof Date) {
                return d.toISOString().split('T')[0];
            }
            return d;
        },

        formatMoney(n) {
            return parseFloat(n || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        },

        formatRateDisplay(rate, rateUnit) {
            // 根据利率模式显示不同的格式
            // rateUnit 可以是 period 对象中的 rate_unit，或者是当前表单的 custom_rate_unit
            const unit = rateUnit || this.form.custom_rate_unit;
            const rateNum = parseFloat(rate) || 0;
            const yearLabel = "{% trans '年' %}";
            const dayLabel = "{% trans '天' %}";

            if (this.form.rate_mode === 'lpr') {
                return rateNum.toFixed(2) + '%/' + yearLabel;
            } else {
                // 自定义利率模式
                if (unit === 'percent') {
                    return rateNum.toFixed(2) + '%/' + yearLabel;
                } else if (unit === 'permille') {
                    return rateNum.toFixed(2) + '‰/' + dayLabel;
                } else if (unit === 'permyriad') {
                    return rateNum.toFixed(2) + '‱/' + dayLabel;
                }
                return rateNum.toFixed(2) + '%';
            }
        },

        get groupedByPrincipal() {
            // 按本金连续性分组
            // 同一笔本金的多段LPR分段在时间上是连续的
            // 不同笔本金之间时间段有重叠或间隔
            if (!this.result || !this.result.periods) return [];

            const groups = [];
            let currentGroup = null;
            let lastEndDate = null;

            for (let i = 0; i < this.result.periods.length; i++) {
                const period = this.result.periods[i];
                const principal = parseFloat(period.principal);

                // 判断是否需要创建新分组：
                // 1. 第一段
                // 2. 本金金额变化
                // 3. 时间段重叠（当前段开始日期 <= 上一段结束日期）
                // 4. 时间段有间隔（当前段开始日期 > 上一段结束日期 + 1天）
                const startDate = new Date(period.start_date);
                const endDate = new Date(period.end_date);

                let isNewGroup = !currentGroup;

                if (!isNewGroup && currentGroup) {
                    const lastEndDateObj = new Date(lastEndDate);

                    // 时间段重叠（当前段开始日期 <= 上一段结束日期）
                    if (startDate <= lastEndDateObj) {
                        isNewGroup = true;
                    }
                    // 本金金额变化
                    else if (currentGroup.principal !== principal) {
                        isNewGroup = true;
                    }
                }

                if (isNewGroup) {
                    if (currentGroup) groups.push(currentGroup);
                    currentGroup = {
                        key: `group_${groups.length}`,
                        principal: principal,
                        periods: [period],
                        totalDays: period.days,
                        totalInterest: parseFloat(period.interest)
                    };
                } else {
                    currentGroup.periods.push(period);
                    currentGroup.totalDays += period.days;
                    currentGroup.totalInterest += parseFloat(period.interest);
                }

                lastEndDate = period.end_date;
            }
            if (currentGroup) groups.push(currentGroup);

            return groups;
        },

        addChange() {
            // 新行默认继承上一行的结束日期的下一天作为开始日期
            const last = this.form.changes[this.form.changes.length - 1];
            let nextStartDate = '';
            if (last && last.end_date) {
                const endDate = new Date(last.end_date);
                endDate.setDate(endDate.getDate() + 1);
                nextStartDate = this.formatDate(endDate);
            }
            const newChange = {start_date: nextStartDate, end_date: '', principal: last ? last.principal : ''};
            this.form.changes.push(newChange);
        },

        onChangeStartDate(index) {
            // 如果当前行有开始日期和结束日期，确保结束日期不早于开始日期
            const item = this.form.changes[index];
            if (item.start_date && item.end_date && item.end_date < item.start_date) {
                item.end_date = item.start_date;
            }
            // 更新下一行的开始日期为当前行结束日期的下一天
            if (index < this.form.changes.length - 1 && item.end_date) {
                const endDate = new Date(item.end_date);
                endDate.setDate(endDate.getDate() + 1);
                this.form.changes[index + 1].start_date = this.formatDate(endDate);
            }
        },

        onChangeEndDate(index) {
            // 如果当前行有开始日期和结束日期，确保结束日期不早于开始日期
            const item = this.form.changes[index];
            if (item.start_date && item.end_date && item.end_date < item.start_date) {
                item.end_date = item.start_date;
            }
            // 更新下一行的开始日期为当前行结束日期的下一天
            if (index < this.form.changes.length - 1 && item.end_date) {
                const endDate = new Date(item.end_date);
                endDate.setDate(endDate.getDate() + 1);
                this.form.changes[index + 1].start_date = this.formatDate(endDate);
            }
        },

        removeChange(i) {
            this.form.changes.splice(i, 1);
            if (this.form.changes.length === 0) {
                this.form.changes.push({start_date: '', end_date: '', principal: ''});
            }
        },

        async calculate() {
            this.result = null;
            const data = {
                year_days: parseInt(this.form.year_days),
                date_inclusion: this.form.date_inclusion
            };

            // 利率设置
            if (this.form.rate_mode === 'lpr') {
                data.rate_mode = 'lpr';
                data.rate_type = this.form.rate_type;
                data.multiplier = parseFloat(this.form.multiplier) || 1;
            } else if (this.form.rate_mode === 'delay') {
                // 迟延履行利率：固定万分之1.75/天
                data.rate_mode = 'custom';
                data.custom_rate_unit = 'permyriad';
                data.custom_rate_value = 1.75;
            } else {
                data.rate_mode = 'custom';
                data.custom_rate_unit = this.form.custom_rate_unit;
                data.custom_rate_value = parseFloat(this.form.custom_rate_value) || 0;
            }

            if (this.useChanges) {
                // 过滤掉无效日期（如11月31日）
                const validChanges = [];
                for (let i = 0; i < this.form.changes.length; i++) {
                    const c = this.form.changes[i];
                    if (!c.start_date || !c.end_date || !c.principal) continue;

                    // 验证日期有效性
                    const startDate = new Date(c.start_date);
                    const endDate = new Date(c.end_date);
                    if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) {
                        console.warn(`第${i+1}行日期无效:`, c.start_date, c.end_date);
                        continue;
                    }

                    validChanges.push(c);
                }

                data.principal_changes = validChanges;
                if (!data.principal_changes.length) {
                    this.result = {success: false, message: '{% trans "请填写完整的本金变动信息（注意日期有效性）" %}'}
                    return;
                }
            } else {
                data.start_date = this.form.start_date;
                data.end_date = this.form.end_date;
                data.principal = this.form.principal;
                if (!data.start_date || !data.end_date || !data.principal) {
                    this.result = {success: false, message: '{% trans "请填写日期和本金" %}'}
                    return;
                }
            }

            try {
                const res = await fetch('/api/v1/lpr/calculate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)?.[1] || ''
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    console.error('API Error:', res.status, errorData);

                    if (res.status === 422) {
                        // 验证错误（如无效日期）
                        const detail = errorData.detail || [];
                        const errors = detail.map(d => `${d.loc?.join('.')} - ${d.msg}`).join('; ');
                        this.result = {success: false, message: '{% trans "数据验证失败" %}: ' + (errors || JSON.stringify(errorData))};
                    } else {
                        this.result = {success: false, message: '{% trans "请求失败" %}: ' + (errorData.message || res.statusText)};
                    }
                    return;
                }

                this.result = await res.json();

                // 计算成功后保存到历史记录（如果不是从历史记录加载的）
                if (this.result.success && !this._skipHistorySave) {
                    this.saveToHistory();
                }
                // 重置标记
                this._skipHistorySave = false;
            } catch (e) {
                console.error('Fetch Error:', e);
                this.result = {success: false, message: '{% trans "计算失败" %}: ' + e.message}
            }
        },

        copyResult() {
            if (!this.result?.success) return;
            const title = "{% trans 'LPR利息计算结果' %}";
            const totalInterestLabel = "{% trans '总利息' %}";
            const totalDaysLabel = "{% trans '计息天数' %}";
            const principalLabel = "{% trans '本金' %}";
            const text = `${title}\n${totalInterestLabel}: ¥${this.formatMoney(this.result.total_interest)}\n${totalDaysLabel}: ${this.result.total_days}{% trans '天' %}\n${principalLabel}: ¥${this.formatMoney(this.result.total_principal)}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('{% trans "已复制到剪贴板" %}');
            });
        },

        copyDetail() {
            if (!this.result?.success) return;

            const isDetail = this.showDetail;
            const principalLabel = "{% trans '本金' %}";
            const daysLabel = "{% trans '天数' %}";
            const interestLabel = "{% trans '利息' %}";
            const periodLabel = "{% trans '期间' %}";
            const rateLabel = "{% trans '利率' %}";
            const totalLabel = "{% trans '总计' %}";
            const sumLabel = "{% trans '合计' %}";
            const interestPeriodLabel = "{% trans '计息期间' %}";

            let html = '<table border="1" cellspacing="0" cellpadding="8" style="border-collapse: collapse; font-size: 12pt; width: 100%;">';

            if (isDetail) {
                // 展开状态 - 按本金分组复制
                for (const group of this.groupedByPrincipal) {
                    // 分组标题行
                    html += '<tr style="background-color: #417690; color: #ffffff; font-weight: bold;">';
                    html += `<td colspan="4" style="border: 1px solid #000; padding: 8px; background-color: #417690; color: #ffffff; font-weight: bold;">${principalLabel}: ¥${this.formatMoney(group.principal)} | ${daysLabel}: ${group.totalDays} | ${interestLabel}: ¥${this.formatMoney(group.totalInterest)}</td>`;
                    html += '</tr>';

                    // 表头
                    html += '<tr style="background-color: #f2f2f2; font-weight: bold;">';
                    html += `<td style="border: 1px solid #000; padding: 8px;">${periodLabel}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 8px;">${daysLabel}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 8px;">${rateLabel}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 8px;">${interestLabel}</td>`;
                    html += '</tr>';

                    // 数据行
                    for (const p of group.periods) {
                        html += '<tr>';
                        html += `<td style="border: 1px solid #000; padding: 8px;">${this.formatDate(p.start_date)} ~ ${this.formatDate(p.end_date)}</td>`;
                        html += `<td style="border: 1px solid #000; padding: 8px;">${p.days}</td>`;
                        html += `<td style="border: 1px solid #000; padding: 8px;">${this.formatRateDisplay(p.rate, p.rate_unit)}</td>`;
                        html += `<td style="border: 1px solid #000; padding: 8px;">¥${this.formatMoney(p.interest)}</td>`;
                        html += '</tr>';
                    }
                }

                // 总计行
                html += '<tr style="background-color: #417690; color: #ffffff; font-weight: bold;">';
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold;">${totalLabel}</td>`;
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold;">${this.result.total_days}</td>`;
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold;">-</td>`;
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold; font-size: 14px;">¥${this.formatMoney(this.result.total_interest)}</td>`;
                html += '</tr>';
            } else {
                // 收起状态 - 按本金汇总复制
                html += '<tr style="background-color: #f2f2f2; font-weight: bold;">';
                html += `<td style="border: 1px solid #000; padding: 8px;">${principalLabel}</td>`;
                html += `<td style="border: 1px solid #000; padding: 8px;">${interestPeriodLabel}</td>`;
                html += `<td style="border: 1px solid #000; padding: 8px;">${daysLabel}</td>`;
                html += `<td style="border: 1px solid #000; padding: 8px;">${interestLabel}</td>`;
                html += '</tr>';

                for (const group of this.groupedByPrincipal) {
                    const start = this.formatDate(group.periods[0].start_date);
                    const end = this.formatDate(group.periods[group.periods.length - 1].end_date);
                    html += '<tr>';
                    html += `<td style="border: 1px solid #000; padding: 8px;">¥${this.formatMoney(group.principal)}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 8px;">${start} ~ ${end}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 8px;">${group.totalDays}</td>`;
                    html += `<td style="border: 1px solid #000; padding: 8px;">¥${this.formatMoney(group.totalInterest)}</td>`;
                    html += '</tr>';
                }

                // 汇总行
                html += '<tr style="background-color: #417690; color: #ffffff; font-weight: bold;">';
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold;">${sumLabel}</td>`;
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold;">-</td>`;
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold;">${this.result.total_days}</td>`;
                html += `<td style="border: 1px solid #000; padding: 10px; background-color: #417690; color: #ffffff; font-weight: bold; font-size: 14px;">¥${this.formatMoney(this.result.total_interest)}</td>`;
                html += '</tr>';
            }

            html += '</table>';

            // 复制HTML到剪贴板
            const blob = new Blob([html], { type: 'text/html' });
            const data = new ClipboardItem({ 'text/html': blob });

            const detailTitle = "{% trans 'LPR利息计算明细' %}";

            navigator.clipboard.write([data]).then(() => {
                alert('{% trans "明细表格已复制，可直接粘贴到Word" %}');
            }).catch(() => {
                // 降级为纯文本
                let text = detailTitle + '\n\n';

                if (isDetail) {
                    for (const group of this.groupedByPrincipal) {
                        text += `${principalLabel}: ¥${this.formatMoney(group.principal)} | ${daysLabel}: ${group.totalDays} | ${interestLabel}: ¥${this.formatMoney(group.totalInterest)}\n`;
                        text += `${periodLabel} | ${daysLabel} | ${rateLabel} | ${interestLabel}\n`;
                        text += '-'.repeat(50) + '\n';
                        for (const p of group.periods) {
                            text += `${this.formatDate(p.start_date)}~${this.formatDate(p.end_date)} | ${p.days} | ${this.formatRateDisplay(p.rate, p.rate_unit)} | ¥${this.formatMoney(p.interest)}\n`;
                        }
                        text += '\n';
                    }
                    text += `${totalLabel} | ${this.result.total_days} | - | ¥${this.formatMoney(this.result.total_interest)}\n`;
                } else {
                    text += `${principalLabel} | ${interestPeriodLabel} | ${daysLabel} | ${interestLabel}\n`;
                    text += '-'.repeat(60) + '\n';
                    for (const group of this.groupedByPrincipal) {
                        const start = this.formatDate(group.periods[0].start_date);
                        const end = this.formatDate(group.periods[group.periods.length - 1].end_date);
                        text += `¥${this.formatMoney(group.principal)} | ${start}~${end} | ${group.totalDays} | ¥${this.formatMoney(group.totalInterest)}\n`;
                    }
                    text += '-'.repeat(60) + '\n';
                    text += `${sumLabel} | - | ${this.result.total_days} | ¥${this.formatMoney(this.result.total_interest)}\n`;
                }

                navigator.clipboard.writeText(text).then(() => {
                    alert('{% trans "明细已复制（纯文本格式）" %}');
                });
            });
        },

        reset() {
            this.useChanges = false;
            this.form.principal = '';
            this.form.rate_mode = 'lpr';
            this.form.rate_type = '1y';
            this.form.multiplier = 1;
            this.form.custom_rate_unit = 'percent';
            this.form.custom_rate_value = '';
            this.form.year_days = 360;
            this.form.date_inclusion = 'both';
            this.form.changes = [{start_date: '', end_date: '', principal: ''}];
            this.result = null;
            this.init();
        }
    }
}
</script>
