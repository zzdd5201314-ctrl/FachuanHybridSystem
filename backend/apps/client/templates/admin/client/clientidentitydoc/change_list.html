{% extends "admin/change_list.html" %}
{% load i18n admin_urls %}

{% block extrahead %}
{{ block.super }}
<style>
    .merge-help-box {
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        padding: 15px;
        margin-bottom: 20px;
    }
    .merge-help-box h3 {
        margin-top: 0;
        color: #495057;
    }
    .merge-help-box ol {
        margin-bottom: 0;
        padding-left: 20px;
    }
    .merge-help-box li {
        margin-bottom: 8px;
    }
    .merge-help-box code {
        background: #e9ecef;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.9em;
    }
    .api-example {
        background: #2d2d2d;
        color: #f8f8f2;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: monospace;
        font-size: 0.85em;
        margin-top: 10px;
    }
    .merge-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #417690;
        color: #fff !important;
        padding: 8px 16px;
        border-radius: 4px;
        text-decoration: none;
        font-weight: 500;
        transition: background 0.2s;
    }
    .merge-button:hover {
        background: #205067;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block object-tools-items %}
{{ block.super }}
<li>
    <a href="{% url 'admin:id_card_merge' %}" class="merge-button">
        🪪 {% trans "身份证合并" %}
    </a>
</li>
{% endblock %}

{% block content %}
{{ block.super }}
{% endblock %}
