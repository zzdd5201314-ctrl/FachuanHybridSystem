{% load i18n %}
<div x-data="{{ folder_browser_component }}({{ folder_browser_entity_pk }})" class="folder-binding-widget">
    <h3>📁 {% trans "文件夹绑定" %}</h3>

    <div class="binding-status">
        <span class="status-badge" :class="binding ? 'bound' : 'unbound'"
              x-text="binding ? '{% trans "已绑定" %}' : '{% trans "未绑定" %}'"></span>
    </div>

    <div x-show="binding" class="binding-path" x-text="binding?.display_path || binding?.folder_path"></div>

    <div class="binding-actions">
        <button type="button" class="btn-folder primary" @click="openBrowser()" :disabled="loading">
            <span x-show="!loading">{% trans "选择文件夹" %}</span>
            <span x-show="loading">{% trans "加载中..." %}</span>
        </button>
        <button type="button" class="btn-folder danger" @click="unbindFolder()" x-show="binding" :disabled="loading">
            {% trans "解除绑定" %}
        </button>
    </div>

    <div x-show="showBrowser" x-cloak class="folder-browser-modal" @click.self="closeBrowser()">
        <div class="folder-browser-content">
            <div class="folder-browser-header" style="position: relative;">
                <h2>{% trans "选择文件夹" %}</h2>
                <button type="button" class="folder-browser-close" @click="closeBrowser()">×</button>
                <div class="manual-path-input">
                    <input type="text" x-model="manualPath"
                           placeholder="{% trans '输入文件夹路径，例如：/Users/username/Documents' %}"
                           @keydown.enter="bindManualPath()">
                    <button type="button" class="btn-folder primary" @click="bindManualPath()" :disabled="loading">
                        {% trans "确认" %}
                    </button>
                </div>
                <div x-show="error" class="folder-browser-error" x-text="error"></div>
            </div>

            <div x-show="!loading" class="finder-columns" :class="{ 'loading': loadingColumn }">
                <template x-for="(column, columnIndex) in columns" :key="columnIndex">
                    <div class="finder-column" :class="{ 'loading': loadingColumn && columnIndex === columns.length - 1 }">
                        <template x-if="column.entries.length > 0">
                            <div>
                                <template x-for="(entry, entryIndex) in column.entries" :key="entry.path">
                                    <div class="finder-item"
                                         :class="{ 'selected': column.selectedIndex === entryIndex }"
                                         @click="selectFolder(columnIndex, entryIndex, entry)">
                                        <span class="finder-item-icon">📁</span>
                                        <span class="finder-item-name" x-text="entry.name"></span>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <template x-if="column.entries.length === 0">
                            <div class="finder-empty">{% trans "此文件夹为空" %}</div>
                        </template>
                    </div>
                </template>
            </div>

            <div x-show="loading" class="folder-browser-loading">{% trans "加载中..." %}</div>

            <div class="folder-browser-footer">
                <div class="selected-path-display" x-text="getCurrentPath() || '{% trans "请选择文件夹" %}'"></div>
                <button type="button" class="btn-folder primary"
                        @click="bindCurrentPath()" :disabled="loading || !getCurrentPath()">
                    {% trans "选择此文件夹" %}
                </button>
            </div>
        </div>
    </div>
</div>
