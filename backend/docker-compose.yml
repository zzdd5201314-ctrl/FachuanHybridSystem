services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-fachuan_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fachuan_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8002:8002"
    volumes:
      - media-data:/app/apiSystem/media
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgresql}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/admin/login/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qcluster:
    build: .
    entrypoint: ["sh", "-c", "cd /app/apiSystem && uv run python manage.py qcluster"]
    volumes:
      - media-data:/app/apiSystem/media
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE:-postgresql}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  media-data:
