<!DOCTYPE html>
{% load i18n %}
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "登录" %} | {% trans "法穿AI案件管理系统" %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg-deep: #0a0e1a;
            --bg-panel: #0f1629;
            --bg-card: #151d35;
            --bg-input: #1a2340;
            --border-subtle: rgba(255,255,255,0.06);
            --border-focus: #6c5ce7;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-glow: rgba(108,92,231,0.35);
            --gold: #d4a855;
            --gold-light: #f0d48a;
            --text-primary: #f0f0f5;
            --text-secondary: rgba(240,240,245,0.55);
            --text-tertiary: rgba(240,240,245,0.35);
            --success: #00b894;
            --error: #ff6b6b;
            --warning: #fdcb6e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ====== 布局 ====== */
        .auth-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ====== 左侧品牌区 ====== */
        .brand-panel {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 70px;
            overflow: hidden;
            background: linear-gradient(160deg, #0f1629 0%, #151d35 40%, #1a1040 100%);
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(108,92,231,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .brand-panel::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,168,85,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .brand-content {
            position: relative;
            z-index: 2;
        }

        .brand-headline {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .brand-headline .highlight {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-statement {
            position: relative;
            max-width: 520px;
            margin-top: 10px;
        }

        .statement-quote {
            position: absolute;
            top: -28px;
            left: -12px;
            font-size: 120px;
            font-weight: 700;
            line-height: 1;
            color: rgba(108,92,231,0.08);
            font-family: Georgia, serif;
            user-select: none;
            pointer-events: none;
        }

        .brand-desc {
            font-size: 20px;
            line-height: 1.8;
            color: var(--text-secondary);
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .brand-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .brand-footer {
            position: absolute;
            bottom: 30px;
            left: 70px;
            font-size: 12px;
            color: var(--text-tertiary);
            z-index: 2;
        }

        .brand-footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        /* ====== 右侧表单区 ====== */
        .form-panel {
            width: 520px;
            min-width: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border-subtle);
            position: relative;
            overflow-y: auto;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* 表单头部 */
        .form-header {
            margin-bottom: 32px;
        }

        .form-header h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 首次用户提示 */
        .first-user-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,184,148,0.1);
            border: 1px solid rgba(0,184,148,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: var(--success);
            margin-top: 12px;
        }

        .approval-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(253,203,110,0.1);
            border: 1px solid rgba(253,203,110,0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: var(--warning);
            margin-top: 12px;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-label .required {
            color: var(--accent-light);
            margin-left: 2px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: rgba(160, 170, 200, 0.6);
            pointer-events: none;
            transition: color 0.2s;
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 36px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .form-input:hover {
            border-color: rgba(255,255,255,0.12);
        }

        .form-input:focus {
            border-color: var(--accent);
            background: rgba(26,35,64,0.9);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input:focus ~ .input-icon {
            color: var(--accent);
        }

        /* 中文提示 */
        .chinese-hint {
            font-size: 11px;
            color: var(--accent-light);
            margin-top: 6px;
        }

        /* 密码可见切换 */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        /* 密码强度指示器 */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            transition: background 0.3s;
        }

        .strength-bar.active.weak { background: var(--error); }
        .strength-bar.active.medium { background: var(--warning); }
        .strength-bar.active.strong { background: var(--success); }

        .strength-text {
            font-size: 11px;
            margin-top: 4px;
            color: var(--text-tertiary);
        }

        .strength-text.weak { color: var(--error); }
        .strength-text.medium { color: var(--warning); }
        .strength-text.strong { color: var(--success); }

        /* 错误状态 */
        .form-input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(255,107,107,0.15);
        }

        /* 错误列表 */
        .error-list {
            list-style: none;
            margin-top: 6px;
        }

        .error-list li {
            color: var(--error);
            font-size: 12px;
            padding: 2px 0;
        }

        /* 错误横幅 */
        .error-banner {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #ff8a8a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 记住我 */
        .form-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 24px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            background: var(--bg-input);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-label input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox-label input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: white;
        }

        /* 主按钮 */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b7cf7 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 快速体验区 */
        .quick-experience {
            margin-top: 24px;
            padding: 18px;
            background: rgba(212,168,85,0.05);
            border: 1px solid rgba(212,168,85,0.12);
            border-radius: 12px;
        }

        .quick-experience h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quick-experience p {
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .admin-credentials {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .cred-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            padding: 6px 10px;
        }

        .cred-row span { opacity: 0.7; }

        .cred-row code {
            font-family: 'SF Mono', Monaco, monospace;
            color: var(--gold-light);
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .btn-gold {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--gold) 0%, #c4973d 100%);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(212,168,85,0.3);
        }

        /* 底部链接 */
        .form-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .form-footer a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .form-footer a:hover {
            color: var(--gold);
        }

        /* ====== Alpine.js 切换动画 ====== */
        .auth-section {
            will-change: opacity, transform;
        }

        /* ====== 响应式 ====== */
        @media (max-width: 1024px) {
            .brand-panel { display: none; }
            .form-panel { width: 100%; min-width: unset; }
        }

        @media (max-width: 480px) {
            .form-panel { padding: 24px; }
            .form-header h2 { font-size: 22px; }
        }
    </style>
</head>
<body x-data="authPanel()" x-init="init()">
    <div class="auth-layout">
        <!-- 左侧品牌区 -->
        <div class="brand-panel">
            <div class="grid-bg"></div>
            <div class="brand-glow"></div>

            <div class="brand-content">
                <h1 class="brand-headline">
                    {% trans "让每一个案件" %}<br>
                    <span class="highlight">{% trans "自动运转" %}</span>
                </h1>

                <div class="brand-statement">
                    <div class="statement-quote">&ldquo;</div>
                    <p class="brand-desc">
                        {% trans "从客户接洽到结案归档，全流程自动化。短信驱动、AI 赋能，把律师从事务性工作中解放出来。" %}
                    </p>
                </div>
            </div>

            <div class="brand-footer">
                &copy; 2026 {% trans "法穿AI" %} &middot; PolyForm Noncommercial {% trans "开源" %} &middot; <a href="https://github.com/Lawyer-ray/FachuanHybridSystem" target="_blank">GitHub</a>
            </div>
        </div>

        <!-- 右侧表单区 -->
        <div class="form-panel">
            <div class="form-container">

                <!-- ====== 登录表单 ====== -->
                <template x-if="mode === 'login'">
                    <div class="auth-section"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 translate-x-[40px]"
                         x-transition:enter-end="opacity-100 translate-x-0"
                         x-transition:leave="transition ease-in duration-150"
                         x-transition:leave-start="opacity-100"
                         x-transition:leave-end="opacity-0">

                        <div class="form-header">
                            <h2>{% trans "欢迎回来" %}</h2>
                            <p>{% trans "登录法穿AI案件管理系统" %}</p>
                        </div>

                        {% if form.errors %}
                        <div class="error-banner">
                            <span>&#x26A0;&#xFE0F;</span>
                            <span>{% trans "用户名或密码错误，请重试" %}</span>
                        </div>
                        {% endif %}

                        <form method="post" action="{{ app_path }}">
                            {% csrf_token %}
                            <input type="hidden" name="next" value="{{ next }}">

                            <div class="form-group">
                                <label class="form-label" for="id_username">
                                    {% trans "用户名 / 真实姓名" %} <span class="required">*</span>
                                </label>
                                <div class="input-wrapper">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                        <circle cx="12" cy="7" r="4"/>
                                    </svg>
                                    <input type="text" name="username" id="id_username" class="form-input" placeholder="{% trans '请输入中文姓名' %}" autofocus required autocomplete="username">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="id_password">
                                    {% trans "密码" %} <span class="required">*</span>
                                </label>
                                <div class="input-wrapper">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                    </svg>
                                    <input type="password" name="password" id="id_password" class="form-input" placeholder="{% trans '请输入密码' %}" required autocomplete="current-password">
                                    <button type="button" class="password-toggle" onclick="togglePwd('id_password', this)">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <div class="form-row">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="remember"> {% trans "记住我" %}
                                </label>
                            </div>

                            <button type="submit" class="btn-primary">{% trans "登录" %}</button>
                        </form>

                        <div class="form-footer">
                            {% trans "还没有账号？" %}<a href="#" @click.prevent="switchTo('register')">{% trans "立即注册" %}</a>
                        </div>
                    </div>
                </template>

                <!-- ====== 注册表单 ====== -->
                <template x-if="mode === 'register'">
                    <div class="auth-section"
                         x-transition:enter="transition ease-out duration-300"
                         x-transition:enter-start="opacity-0 translate-x-[40px]"
                         x-transition:enter-end="opacity-100 translate-x-0"
                         x-transition:leave="transition ease-in duration-150"
                         x-transition:leave-start="opacity-100"
                         x-transition:leave-end="opacity-0">

                        <div class="form-header">
                            <h2>{% trans "创建账号" %}</h2>
                            <p>{% trans "加入法穿AI案件管理系统" %}</p>
                            {% if is_first_user %}
                            <div class="first-user-badge">&#x1F389; {% trans "您将成为第一个用户，自动获得管理员权限" %}</div>
                            {% else %}
                            <div class="approval-badge">&#x23F3; {% trans "注册后需等待管理员开通权限" %}</div>
                            {% endif %}
                        </div>

                        {% if show_auto_register %}
                        <div class="quick-experience">
                            <h4>&#x1F680; {% trans "快速体验" %}</h4>
                            <p>{% trans "首次使用？一键创建默认超级管理员，立即可用。" %}</p>
                            <div class="admin-credentials">
                                <div class="cred-row"><span>{% trans "账号" %}</span><code>法穿</code></div>
                                <div class="cred-row"><span>{% trans "密码" %}</span><code>1234qwer</code></div>
                            </div>
                            <form method="post" action="{% url 'admin_register' %}">
                                {% csrf_token %}
                                <input type="hidden" name="action" value="auto_register">
                                <button type="submit" class="btn-gold">{% trans "自动注册默认管理员" %}</button>
                            </form>
                        </div>
                        {% endif %}

                        {% if reg_form and reg_form.non_field_errors %}
                        <div class="error-banner">
                            <span>&#x26A0;&#xFE0F;</span>
                            <span>{% for error in reg_form.non_field_errors %}{{ error }}{% endfor %}</span>
                        </div>
                        {% endif %}

                        <form method="post" action="{% url 'admin_register' %}">
                            {% csrf_token %}

                            {% if reg_form %}
                            {% for field in reg_form %}
                            <div class="form-group">
                                <label class="form-label" for="{{ field.id_for_label }}">
                                    {{ field.label }}{% if field.field.required %}<span class="required">*</span>{% endif %}
                                </label>
                                {% if field.name == 'username' %}
                                <div class="input-wrapper">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                        <circle cx="12" cy="7" r="4"/>
                                    </svg>
                                    <input type="text" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-input" placeholder="{% trans '请输入中文姓名' %}" style="padding-left:36px;" value="{{ field.value|default:'' }}" {% if field.field.required %}required{% endif %}>
                                </div>
                                <p class="chinese-hint">&#x26A0;&#xFE0F; {% trans "只能输入中文" %}</p>
                                {% elif field.name == 'password1' %}
                                <div class="input-wrapper">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                    </svg>
                                    <input type="password" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-input" placeholder="{% trans '至少8位，含字母和数字' %}" style="padding-left:36px;padding-right:38px;" oninput="checkStrength(this.value)" {% if field.field.required %}required{% endif %}>
                                    <button type="button" class="password-toggle" onclick="togglePwd('{{ field.id_for_label }}', this)">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="password-strength" id="pwd-strength">
                                    <div class="strength-bar" id="str-1"></div>
                                    <div class="strength-bar" id="str-2"></div>
                                    <div class="strength-bar" id="str-3"></div>
                                    <div class="strength-bar" id="str-4"></div>
                                </div>
                                <div class="strength-text" id="str-text"></div>
                                {% elif field.name == 'password2' %}
                                <div class="input-wrapper">
                                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                    </svg>
                                    <input type="password" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-input" placeholder="{% trans '请再次输入密码' %}" style="padding-left:36px;" {% if field.field.required %}required{% endif %}>
                                </div>
                                {% else %}
                                <div class="input-wrapper">
                                    <input type="text" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form-input" value="{{ field.value|default:'' }}" {% if field.field.required %}required{% endif %}>
                                </div>
                                {% endif %}
                                {% if field.errors %}
                                <ul class="error-list">
                                    {% for error in field.errors %}
                                    <li>{{ error }}</li>
                                    {% endfor %}
                                </ul>
                                {% endif %}
                            </div>
                            {% endfor %}
                            {% endif %}

                            <button type="submit" class="btn-primary">{% trans "注册" %}</button>
                        </form>

                        <div class="form-footer">
                            {% trans "已有账号？" %}<a href="#" @click.prevent="switchTo('login')">{% trans "返回登录" %}</a>
                        </div>
                    </div>
                </template>

            </div>
        </div>
    </div>

    <script>
        function authPanel() {
            return {
                mode: 'login',

                init() {
                    {% if show_register %}
                    this.mode = 'register';
                    {% endif %}
                    if (window.location.hash === '#register') {
                        this.mode = 'register';
                    }
                },

                switchTo(target) {
                    this.mode = target;
                    window.location.hash = target;
                }
            };
        }

        function togglePwd(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        function checkStrength(pwd) {
            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^a-zA-Z0-9]/.test(pwd)) score++;

            const bars = [
                document.getElementById('str-1'),
                document.getElementById('str-2'),
                document.getElementById('str-3'),
                document.getElementById('str-4')
            ];
            const text = document.getElementById('str-text');
            const levels = ['', 'weak', 'medium', 'medium', 'strong'];
            const labels = ['', '{% trans "弱" %}', '{% trans "一般" %}', '{% trans "较强" %}', '{% trans "强" %}'];

            bars.forEach((bar, i) => {
                bar.className = 'strength-bar';
                if (i < score) {
                    bar.classList.add('active', levels[score]);
                }
            });

            text.className = 'strength-text ' + levels[score];
            text.textContent = pwd ? '{% trans "密码强度：" %}' + labels[score] : '';
        }
    </script>
</body>
</html>
