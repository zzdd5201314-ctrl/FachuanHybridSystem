        .chat-ai-tasks {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4rem;
        }

        .chat-ai-task {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .chat-ai-task span {
            font-size: 0.8rem;
        }

        .chat-ai-task.processing {
            opacity: 1;
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
            color: var(--text-primary);
            animation: chatTaskPulse 1s ease-in-out infinite;
        }

        .chat-ai-task.completed {
            opacity: 1;
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
            color: #22c55e;
        }

        @keyframes chatTaskPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.3); }
            50% { box-shadow: 0 0 8px 2px rgba(251, 191, 36, 0.15); }
        }

        /* 截帧 3x2 迷你网格 */
        .chat-frames-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.3rem;
        }

        .chat-frame-mini {
            aspect-ratio: 9/16;
            max-height: 50px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(6, 182, 212, 0.1));
            border: 1px solid var(--border);
            border-radius: 4px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            position: relative;
        }

        .chat-frame-mini.show {
            opacity: 1;
            transform: scale(1);
        }

        .chat-frame-mini.dup {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .chat-frame-mini.dup .dup-x {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem;
            color: #ef4444;
            font-weight: bold;
        }

        .chat-frame-mini.removing {
            opacity: 0;
            transform: scale(0.5);
        }

        .chat-frames-stat {
            margin-top: 0.5rem;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .chat-frames-stat span {
            font-weight: 700;
            color: var(--primary);
        }

        /* 导出文件 */
        .chat-export-file {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .chat-export-file.show {
            opacity: 1;
            transform: translateY(0);
        }

        .chat-export-icon {
            font-size: 1.5rem;
        }

        .chat-export-info {
            flex: 1;
        }

        .chat-export-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-export-meta {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chat-flow-compact {
                flex-direction: column;
                gap: 0.75rem;
            }

            .chat-arrow {
                transform: rotate(90deg);
                width: auto;
                height: 24px;
            }

            .chat-ai-tasks {
                grid-template-columns: repeat(2, 1fr);
            }

            .chat-frames-mini {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 控制按钮 */
        .chat-flow-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        /* ========== 案件全流程管理与智能文书生成动画 V2 ========== */
        .case-flow-section {
            padding: 8rem 2rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, transparent, rgba(99, 102, 241, 0.03), transparent);
        }

        .case-flow-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 主布局 - 左右分栏 */
        .case-flow-demo-v2 {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            margin-top: 3rem;
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            min-height: 600px;
        }

        /* 左侧面板 */
        .case-left-panel {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* 上传区域 */
        .case-upload-box {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.4s ease;
            opacity: 0;
            transform: scale(0.9);
        }

        .case-upload-box.active {
            opacity: 1;
            transform: scale(1);
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .case-upload-box.done {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .case-upload-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .case-upload-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .case-upload-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* AI 识别结果 - 紧凑版 */
        .case-ai-compact {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 1rem;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.4s ease;
        }

        .case-ai-compact.active {
            opacity: 1;
            transform: translateY(0);
        }

        .case-ai-compact-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .case-ai-compact-icon {
            font-size: 1rem;
        }

        .case-ai-compact-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .case-ai-compact-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .case-ai-compact-item {
            padding: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .case-ai-compact-item.active {
            opacity: 1;
            border-color: var(--primary);
        }

        .case-ai-compact-item.done {
            opacity: 1;
            border-color: #22c55e;
        }

        .case-ai-compact-item .label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .case-ai-compact-item .value {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 0.125rem;
        }

        /* 生成状态 */
        .case-gen-status {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.4s ease;
        }

        .case-gen-status.active {
            opacity: 1;
            transform: translateY(0);
        }

        .case-gen-status-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .case-gen-status-item.processing {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.05);
        }

        .case-gen-status-item.done {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .case-gen-status-item .icon {
            font-size: 1rem;
        }

        .case-gen-status-item .text {
            flex: 1;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .case-gen-status-item .status {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .case-gen-status-item.processing .status {
            color: #fbbf24;
        }

        .case-gen-status-item.done .status {
            color: #22c55e;
        }

        /* 文件夹树形结构 */
        .case-folder-tree {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.5s ease;
        }

        .case-folder-tree.active {
            opacity: 1;
            transform: translateX(0);
        }

        .folder-tree-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: rgba(99, 102, 241, 0.1);
            border-bottom: 1px solid var(--border);
        }

        .folder-tree-icon {
            font-size: 1.25rem;
        }

        .folder-tree-title {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .folder-tree-badge {
            padding: 0.25rem 0.75rem;
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #fbbf24;
        }

        .folder-tree-badge.done {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .folder-tree-content {
            padding: 1rem;
            max-height: 500px;
            overflow-y: auto;

        /* 文件夹节点 */
        .folder-node {

            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .folder-node.show {
            opacity: 1;
            transform: translateX(0);
        }

        .folder-node.level-0 {
            margin-bottom: 0.5rem;
        }

        .folder-node.level-1 {
            margin-left: 1.25rem;

            padding-left: 0.75rem;
            border-left: 1px solid var(--border);
        }

        .folder-node.level-2 {
            margin-left: 1.25rem;
            margin-top: 0.2rem;
            padding-left: 0.75rem;
            border-left: 1px solid var(--border);
        }

        .file-node.level-2 {
            margin-left: 1.25rem;
        }

        .file-node.level-3 {
            margin-left: 1.5rem;
        }

        .folder-node-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .folder-node.show .folder-node-header {
            background: rgba(99, 102, 241, 0.05);
        }

        .folder-icon {
            font-size: 0.9rem;
        }

        .folder-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .folder-children {
            margin-top: 0.25rem;

            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .file-node.show {

            transform: translateX(0);
