[mypy]
# Python version
python_version = 3.12

# Django plugin
# NOTE: mypy_django_plugin was previously disabled due to django-stubs INTERNAL ERROR bug
# (AssertionError: Must not defer during final iteration in request.pyi)
# Fixed by upgrading django-stubs from 6.0.2 to 6.0.3
# IMPORTANT: Requires PYTHONPATH=apiSystem:. when running mypy
# NOTE: --follow-imports=skip is incompatible with this plugin (causes INTERNAL ERROR)
# Use --follow-imports=silent instead for CI changed-files gate
plugins = mypy_django_plugin.main

# Import discovery
mypy_path = .
namespace_packages = True

# Cache configuration
cache_dir = .mypy_cache
incremental = True

# Warnings
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Error handling
ignore_missing_imports = True
no_strict_optional = False
allow_redefinition = True

# Output
show_error_codes = True
show_column_numbers = True
pretty = True

# Strictness (globally enabled)
check_untyped_defs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

# ============================================================
# Per-module options: structural ignores
# ============================================================

# --- Migrations (auto-generated, skip entirely) ---
[mypy-*.migrations.*]
ignore_errors = True


# --- Tests (allow flexibility) ---
[mypy-*.tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# --- Config migrator (complex migration logic) ---
[mypy-apps.core.config.migrator]
warn_return_any = False
disallow_any_expr = False

# --- Config migrator executor (accesses dynamic settings attributes via cast(Any)) ---
[mypy-apps.core.config.migrator_executor]
warn_return_any = False

[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

[mypy-conftest]
ignore_errors = False

# ============================================================
# Per-module options: existing code gradual adoption
# These modules have legacy code that predates strict mode.
# New code in these modules should still follow strict typing.
# ============================================================

