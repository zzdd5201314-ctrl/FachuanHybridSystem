[mypy]
# Python version
python_version = 3.12

# Django plugin
# NOTE: mypy_django_plugin was previously disabled due to django-stubs INTERNAL ERROR bug
# (AssertionError: Must not defer during final iteration in request.pyi)
# Fixed by upgrading django-stubs from 6.0.2 to 6.0.3
# IMPORTANT: Requires PYTHONPATH=apiSystem:. when running mypy
# NOTE: --follow-imports=skip is incompatible with this plugin (causes INTERNAL ERROR)
# Use --follow-imports=silent instead for CI changed-files gate
plugins = mypy_django_plugin.main

# Import discovery
mypy_path = .
namespace_packages = True

# Cache configuration
cache_dir = .mypy_cache
incremental = True

# Warnings
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Error handling
ignore_missing_imports = True
no_strict_optional = False
allow_redefinition = True

# Output
show_error_codes = True
show_column_numbers = True
pretty = True

# Strictness (globally enabled)
check_untyped_defs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

# ============================================================
# Per-module options: structural ignores
# ============================================================

# --- Migrations (auto-generated, skip entirely) ---
[mypy-*.migrations.*]
ignore_errors = True

# --- Tests (allow flexibility) ---
[mypy-*.tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# ============================================================
# Per-module options: strict typing policy
# ignore_errors = True exceptions are being gradually removed
# as type debt is fixed. Batch 4 (2026-04-28): 11 modules cleaned.
# ============================================================

# --- Models: strict typing enforced ---
[mypy-apps.core.models]
ignore_errors = False

[mypy-apps.core.models.*]
ignore_errors = False

[mypy-apps.organization.models]
ignore_errors = False

[mypy-apps.organization.models.*]
ignore_errors = False

[mypy-apps.contracts.models]
ignore_errors = False

[mypy-apps.contracts.models.*]
ignore_errors = False

[mypy-apps.client.models]
ignore_errors = False

[mypy-apps.client.models.*]
ignore_errors = False

[mypy-apps.documents.models]
ignore_errors = False

[mypy-apps.documents.models.*]
ignore_errors = False

[mypy-apps.automation.models]
ignore_errors = False

[mypy-apps.automation.models.*]
ignore_errors = False

[mypy-apps.reminders.models]
ignore_errors = False

[mypy-apps.reminders.models.*]
ignore_errors = False

[mypy-apps.litigation_ai.models]
ignore_errors = False

[mypy-apps.litigation_ai.models.*]
ignore_errors = False

# --- Services: strict typing enforced ---
[mypy-apps.*.services.*]
ignore_errors = False

# --- Management commands ---


# ============================================================
# Per-module options: third-party libraries without type stubs
# ============================================================

# ============================================================
# django-stubs plugin configuration
# ============================================================

[mypy.plugins.django-stubs]
django_settings_module = apiSystem.settings

# --- Scripts (utility scripts, not part of main codebase) ---
[mypy-scripts.*]
ignore_errors = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-django_q.*]
ignore_missing_imports = True

